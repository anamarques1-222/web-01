<!DOCTYPE html>
<html>

<head>
        <title>FORMULARIO</title>
</head>

<body>
        <h2>Conceitos sobre Formulários</h2>
        <form>
                <div>
                        <label for="nome">Nome: </label>
                        <input type="text">
                </div>
                <br>
                <div>
                        <label for="Idade">Idade: </label>
                        <input type="number" min="0" max="80">
                </div>
                <br>
                <div>
                        <label for="Usuario">Usuario: </label>
                        <input type="text">
                </div>
                <br>
                <div>
                        <label for="Senha">Senha: </label>
                        <input type="password">
                </div>
                <br>
                <div>
                        <label for="dataEvento">Data do Evento: </label>
                        <input type="datetime-local">
                </div>

                <div>

                        <label for="">

                                E-mail<input type="tel" required placeholder="(xx)(xxxxx-xxxx)">
                        </label>
                </div>
                <br>

                <div>
                        <label for="email">
                                <input type="email" required>
                        </label>
                </div>
                <br>

                <div>
                        <label for="peso">
                                Peso: <input type="number" min="0" max="200" step="0.25">
                        </label>
                </div>
                <br>

                <div>
                        <label>
                                <label for="volume">
                                        Volume:<input type="range" min="0" max="100" step="20">
                                </label>
                </div>
                <br>
                <div>
                        <fieldset>
                                <legend>Estado Civil</legend>
                                <p>
                                        <label>
                                                <input type="radio" name="est_civil" value="casado"> Casado:
                                        </label>
                                </p>
                                <p>
                                        <label>
                                                <input type="radio" name="est_civil" value="solteiro"> Solteiro:
                                        </label>
                                </p>
                                <p>
                                        <label>
                                                <input type="radio" name="est_civil" value="divorciado"> Divorciado:
                                        </label>
                                </p>
                        </fieldset>
                </div>
                <br>

                <div>
                        <fieldset>
                                <legend>Produtos</legend>
                                <p>
                                        <label>
                                                <input type="checkbox" name="computador" value="computador"> Computador
                                        </label>
                                </p>
                                <p>
                                        <label>
                                                <input type="checkbox" name="impressora" value="impressora"> Impressora
                                        </label>
                                </p>
                                <p>
                                        <label>
                                                <input type="checkbox" name="monitor" value="monitor"> Monitor
                                        </label>
                                </p>
                        </fieldset>
                </div>
                <br>
                <div>
                        <label>
                        Deixe suas sugestões:
                        <textarea cols="30" rows="5"></textarea>
                        </label>
                </div>
                <br>


                <button typr="submit">Enviar</button>
        </form>
</body>

</html>
